name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'tui-v*'

jobs:
  test:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run typecheck

      - name: Rust tests
        run: cd src-tauri && cargo test

      - name: Rust clippy
        run: cd src-tauri && cargo clippy

  release-tui:
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/tui-v')
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build TUI
        run: |
          cd src-tauri
          cargo build --release --bin proxybot-tui --target ${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proxybot-tui-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.arch == 'arm64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}/release/proxybot-tui

  create-release:
    needs: [test, release-tui]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/tui-v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Compute SHA256
        id: sha256
        run: |
          echo "arm64=$(shasum -a 256 artifacts/proxybot-tui-arm64/proxybot-tui | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86_64=$(shasum -a 256 artifacts/proxybot-tui-x86_64/proxybot-tui | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        env:
          SHA256_ARM64: ${{ steps.sha256.outputs.arm64 }}
          SHA256_X86_64: ${{ steps.sha256.outputs.x86_64 }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#tui-}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          URL_BASE="https://github.com/${OWNER}/${REPO}/releases/download/${TAG}"

          mkdir -p homebrew/Formula
          cat > homebrew/Formula/proxybot-tui.rb << RUBY
          class ProxybotTui < Formula
            desc "ProxyBot TUI — HTTPS MITM proxy terminal UI"
            homepage "https://github.com/${OWNER}/${REPO}"
            license "MIT"
            version "${VERSION}"

            on_macos
            depends_on :macos => :big_sur_or_newer

            if Hardware::CPU.arm64?
              url "${URL_BASE}/proxybot-tui-arm64"
              sha256 "${SHA256_ARM64}"
            else
              url "${URL_BASE}/proxybot-tui-x86_64"
              sha256 "${SHA256_X86_64}"
            end

            def install
              bin.install "proxybot-tui" => "proxybot-tui"
            end
          end
          RUBY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/proxybot-tui.rb
          git commit -m "chore: update Homebrew formula to ${TAG}"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            artifacts/proxybot-tui-arm64/proxybot-tui
            artifacts/proxybot-tui-x86_64/proxybot-tui
          generateReleaseNotes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push formula update to main
        run: |
          git fetch origin main
          git checkout main
          mkdir -p Formula
          cp homebrew/Formula/proxybot-tui.rb Formula/
          git add Formula/proxybot-tui.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update Homebrew formula to ${TAG}"
          git push origin main
